<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>メンダコ</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="page-head">
      <h1>メンダコ</h1>
      <button id="restartButton" type="button">リスタート</button>
    </header>

    <section class="play-panel">
      <div class="hud">
        <div class="hud-pill">
          <span class="hud-label">堆積数</span>
          <strong id="countValue">0</strong>
        </div>
        <div class="hud-pill">
          <span class="hud-label">経過</span>
          <strong id="timeValue">0.0s</strong>
        </div>
      </div>

      <div class="board-frame">
        <canvas id="gameCanvas" width="420" height="680" aria-label="メンダコのゲーム画面"></canvas>
        <div id="gameOverPanel" class="game-over" hidden>
          <p class="game-over-title">メンダコがいっぱいです</p>
          <p class="game-over-text">これ以上は、さすがに乗りません。</p>
        </div>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
