<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>ジェットコースターメイカー</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="app-main">
        <section id="screen-title" class="screen">
          <div class="hero-card">
            <p class="eyebrow">DRAW YOUR RIDE</p>
            <h1>ジェットコースター<br />メイカー</h1>
            <p class="hero-copy">
              横から1本、上から1本。<br />
              自分で描いたコースにそのまま乗り込みます。
            </p>
            <button id="start-button" class="primary-button">
              はじめる
            </button>
          </div>
        </section>

        <section id="screen-input" class="screen active">
          <div class="panel input-panel">
            <div class="panel-head">
              <p class="eyebrow input-kicker">JET COASTER MAKER</p>
              <p id="input-step-badge" class="screen-badge">STEP 1</p>
              <h2 id="input-title">横から見た高さを描く</h2>
              <p id="input-instructions" class="panel-copy"></p>
            </div>

            <div class="canvas-card">
              <div class="canvas-marker start">START</div>
              <div class="canvas-marker goal">GOAL</div>
              <canvas id="input-canvas"></canvas>
            </div>

            <p id="input-status" class="status-text">
              STARTからGOALまで、左から右へつなげてください。
            </p>

            <div class="twist-panel" aria-label="ねじれパターン">
              <div class="twist-head">
                <span class="twist-label">ねじれパターン</span>
              </div>
              <p class="twist-help twist-help-fixed">
                左ねじれ、右ねじれ、直進がコースごとにランダムで入ります。
              </p>
            </div>

            <div id="preview-block" class="preview-block hidden">
              <div class="preview-head">
                <span>横から見たコース</span>
                <span id="preview-status">描いた高さを確認できます</span>
              </div>
              <canvas id="preview-canvas"></canvas>
            </div>

            <div class="button-row">
              <button id="input-reset-button" class="secondary-button">
                描き直し
              </button>
              <button id="input-next-button" class="primary-button" disabled>
                次へ
              </button>
            </div>
          </div>
        </section>

        <section id="screen-ride" class="screen">
          <div class="ride-stage">
            <canvas id="ride-canvas"></canvas>

            <div class="ride-ui">
              <div class="ride-chip">
                <span>速度</span>
                <strong id="speed-readout">0 km/h</strong>
              </div>
              <div class="ride-chip">
                <span>恐怖</span>
                <strong id="fear-readout">平常</strong>
              </div>
            </div>
            <div class="noriko-wipe">
              <div class="noriko-label">ノリコさん</div>
              <canvas id="noriko-canvas"></canvas>
            </div>
          </div>
        </section>

        <section id="screen-result" class="screen">
          <div class="panel result-panel">
            <p class="screen-badge">RESULT</p>
            <h2>絶叫指数</h2>

            <div class="result-score">
              <strong id="scream-score">000</strong>
            </div>

            <div class="button-row result-buttons">
              <button id="reride-button" class="secondary-button">
                同じコースを再走する
              </button>
              <button id="restart-button" class="primary-button">
                もう一度作る
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
