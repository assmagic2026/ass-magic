<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Glide Prototype</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="main.js"></script>
</head>
<body>
  <div id="hud">
    <a
      id="track-card"
      class="ui-control"
      href="https://big-up.style/458G0ndX8N"
      target="_blank"
      rel="noreferrer noopener"
      aria-label="かかとがフランスパン7"
    >
      <img id="track-art" src="./list/phonto%2028.JPG" alt="かかとがフランスパン7 jacket">
      <div id="track-visualizer" aria-hidden="true">
        <span class="viz-bar"></span>
        <span class="viz-bar"></span>
        <span class="viz-bar"></span>
        <span class="viz-bar"></span>
        <span class="viz-bar"></span>
        <span class="viz-bar"></span>
        <span class="viz-bar"></span>
        <span class="viz-bar"></span>
      </div>
    </a>
    <div id="track-controls" class="ui-control">
      <button id="track-toggle" class="track-btn ui-control" type="button" aria-label="Play">
        <span class="track-icon toggle-icon" aria-hidden="true"></span>
      </button>
      <button id="track-next" class="track-btn ui-control" type="button" aria-label="Next track">
        <span class="track-icon next-icon" aria-hidden="true"><span class="next-bar"></span></span>
      </button>
    </div>
    <div id="site-title">ASS MAGIC</div>
    <button id="menu-toggle" class="ui-control" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="site-menu">
      <span class="menu-icon" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
    <div id="site-menu" class="ui-control" aria-hidden="true">
      <div id="site-menu-backdrop" class="ui-control"></div>
      <div id="site-menu-panel" class="ui-control">
        <div id="site-menu-head">
          <div id="site-menu-kicker">ASS MAGIC</div>
          <div id="site-menu-title">Menu</div>
        </div>
        <div id="site-menu-body">
          <nav id="site-menu-nav" class="ui-control" aria-label="Site sections">
            <button class="menu-nav-btn ui-control is-active" type="button" data-page="about">ABOUT</button>
            <button class="menu-nav-btn ui-control" type="button" data-href="https://big-up.style/artists/166607/tune_packages">DISCOGRAPHY</button>
            <button class="menu-nav-btn ui-control" type="button" data-page="interview">INTERVIEW</button>
            <button class="menu-nav-btn ui-control" type="button" data-page="goods">GOODS</button>
            <button class="menu-nav-btn ui-control" type="button" data-page="message">MESSAGE</button>
          </nav>
          <div id="site-menu-pages" class="ui-control">
            <section class="menu-page is-active" data-page="about">
              <h2>ABOUT</h2>
              <p>ASS MAGICとは</p>
              <p>夫婦で活動する謎の音楽ユニット</p>
            </section>
            <section class="menu-page" data-page="interview">
              <h2>INTERVIEW</h2>
              <p>まだされてません</p>
            </section>
            <section class="menu-page" data-page="goods">
              <h2>GOODS</h2>
              <p>まだ作ってません</p>
            </section>
            <section class="menu-page" data-page="message">
              <h2>MESSAGE</h2>
              <form id="message-form" class="ui-control">
                <textarea id="message-text" class="ui-control" rows="6" placeholder="匿名でメッセージを残せる枠です。送信機能はこれから接続できます。"></textarea>
                <button id="message-submit" class="ui-control" type="submit">SEND</button>
                <div id="message-note">現在は画面枠のみです。送信先の接続は次段階で追加できます。</div>
              </form>
            </section>
          </div>
        </div>
      </div>
    </div>
    <div id="right-pad">
      <div id="speed-lock-panel" class="ui-control">
        <div id="speed-lock-head">
          <span id="speed-lock-label">SPEED</span>
        </div>
        <div id="speed-lock-value">40</div>
        <div
          id="speed-lock-slider"
          class="ui-control"
          role="slider"
          tabindex="0"
          aria-label="Speed lock slider"
          aria-orientation="vertical"
          aria-valuemin="12"
          aria-valuemax="120"
          aria-valuenow="40"
        >
          <div class="speed-lock-limit">120</div>
          <div id="speed-lock-rail">
            <div id="speed-lock-fill"></div>
            <div id="speed-lock-thumb"></div>
          </div>
          <div class="speed-lock-limit">12</div>
        </div>
      </div>
    </div>
    <div id="stick-wrapper">
      <div id="stick-area">
        <div id="stick-handle"></div>
      </div>
    </div>
    <div id="info">Glide prototype</div>
  </div>
  <canvas id="c"></canvas>
</body>
</html>
